<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Uppdatera föremål</title>
</head>
<body>

<h1>Uppdatera föremål</h1>

<form th:action="@{/items/edit/{id}(id=${itemId})}"
      th:object="${updateItemDTO}"
      method="post">

    <label>Namn:</label>
    <input type="text" th:field="*{name}" />
    <br>

    <label>Typ:</label>
    <select th:field="*{type}">
        <option th:each="t : ${weaponTypes}"
                th:value="${t}"
                th:text="${t.displayName}">
        </option>
    </select>
    <br>

    <label>Skada:</label>
    <input type="number" th:field="*{damage}" />
    <br>

    <label>Vikt:</label>
    <input type="number" step="0.1" th:field="*{weight}" />
    <br><br>

    <button type="submit">Spara ändringar</button>

</form>

<br>

<a th:href="@{/items/new}">
    Tillbaka till smedjan
</a>

</body>
</html>
