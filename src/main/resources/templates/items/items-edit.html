<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Uppdatera föremål</title>

    <link rel="stylesheet" th:href="@{/css/edit-item.css}">
</head>

<body class="edit-page">

<div class="edit-overlay">
    <div class="edit-container">

        <h1>Förbättra föremål</h1>

        <form th:action="@{/items/edit/{id}(id=${itemId})}"
              th:object="${updateItemDTO}"
              method="post"
              class="edit-form">

            <label>Namn</label>
            <input type="text" th:field="*{name}" />

            <label>Typ</label>
            <select th:field="*{type}">
                <option th:each="t : ${weaponTypes}"
                        th:value="${t}"
                        th:text="${t.displayName}">
                </option>
            </select>

            <label>Skada</label>
            <input type="number" th:field="*{damage}" />

            <label>Vikt</label>
            <input type="number" step="0.1" th:field="*{weight}" />

            <button type="submit" class="edit-btn">Spara ändringar</button>
        </form>

        <a th:href="@{/items/new}" class="edit-back">
            Tillbaka till smedjan
        </a>

    </div>
</div>

</body>
</html>
